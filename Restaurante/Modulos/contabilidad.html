<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Contabilidad Futurista</title>

    <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css"
    />

    <link rel="stylesheet" href="../css/contabilidad.css">
</head>

<body>

    

    <nav class="navbar">

    <div class="navbar-brand">

        <a class="navbar-item titulo-navbar">
            💰 Contabilidad
        </a>

    </div>

    <div class="navbar-end">

        <a type="button" id="btnRegistro" class="navbar-item boton-falso">
            Registrarse
        </a>

        <a type="button" id="btnLogin" class="navbar-item boton-falso">
            Iniciar Sesión
        </a>

    </div>

</nav>

   

    <div class="contenedor">

        <div class="columns">

            

            <div class="column is-4">

                <div class="perfil">

                    <img
                    class="foto"
                    src="https://wallpapercat.com/w/middle-retina/5/5/6/213816-2880x1800-desktop-hd-maluma-wallpaper-image.jpg"
                    >

                    <p class="nombre">
                        Mattias Vargas López
                    </p>

                </div>

            </div>

           

            <div class="column is-8">

                <div class="panel-formulario">

                    <div class="field">
                        <label class="label">Ventas</label>

                        <div class="control">
                            <input
                            class="input"
                            type="text"
                            placeholder="Ingrese ventas"
                            id="ventas">
                        </div>
                    </div>

                    <div class="field">
                        <label class="label">Fecha</label>

                        <div class="control">
                            <input
                            class="input"
                            type="date"
                            id="fecha">
                        </div>
                    </div>

                    <div class="field">
                        <label class="label">Ingresos</label>

                        <div class="control">
                            <input
                            class="input"
                            type="number"
                            placeholder="Ingrese ingresos"
                            id="ingresos">
                        </div>
                    </div>

                    <div class="field">
                        <label class="label">Egresos</label>

                        <div class="control">
                            <input
                            class="input"
                            type="number"
                            placeholder="Ingrese egresos"
                            id="egresos">
                        </div>
                    </div>

                    <div class="field">
                        <label class="label">Concepto</label>

                        <div class="control">
                            <input
                            class="input"
                            type="text"
                            placeholder="Ingrese concepto"
                            id="concepto">
                        </div>
                    </div>

                    <div class="field">
                        <label class="label">Valor</label>

                        <div class="control">
                            <input
                            class="input"
                            type="number"
                            placeholder="Ingrese valor"
                            id="valor">
                        </div>
                    </div>

                    <button id="btnEnviar"
                    class="button boton-enviar">

                    Guardar Registro 

                    </button>

                </div>

            </div>

        </div>

    </div>

    


    <button id="btnInicio">
    Volver al inicio
</button>

<script src="../js/contabilidad.js">
    
</script>

</body>
</html>
    
    
</body>
</html>
