<!DOCTYPE html>
<html lang="es">
<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Usuarios</title>

    <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css"
    />

    <link rel="stylesheet" href="../css/usuarios.css">

</head>

<body>

<nav class="navbar">

    <div class="navbar-brand">

        <a class="navbar-item">

            Registro de Usuarios

        </a>

    </div>

</nav>

<div class="contenedor">

    <div class="box-formulario">

        <div class="columns">

            <div class="column">

                <div class="field">

                    <label class="label">Ingresa tu nombre</label>

                    <div class="control">

                        <input
                         class="input"
                          type="text"
                           placeholder="Ej:Mattias"
                           id="nombre_usuarios">

                    </div>

                </div>

                <div class="field">

                    <label class="label">Ingresa tu apellido</label>

                    <div class="control">

                        <input
                         class="input"
                          type="text"
                           placeholder="Ej:Vargas Lopez"
                           id="apellido">

                    </div>

                </div>

                <div class="field">

                    <label class="label">Tipo de documento</label>

                    <label class="radio">

                        <input type="radio" name="TI">
                        TI

                    </label>

                    <label class="radio">

                        <input type="radio" name="CC">
                        CC

                    </label>

                </div>

                <div class="field">

                    <label class="label">Numero de documento</label>

                    <div class="control">

                        <input class="input" type="number" placeholder="Ej:123456789" id="documento">

                    </div>

                </div>

                <div class="field">

                    <label class="label">Telefono</label>

                    <div class="control">

                        <input class="input" type="number" placeholder="Ej:32134503" id="telefono_usuarios">

                    </div>

                </div>

            </div>

            <div class="column">

                <div class="field">

                    <label class="label">Email</label>

                    <div class="control">

                        <input class="input" type="email" placeholder="Ej:correo@gmail.com" id="email">

                    </div>

                </div>

                <div class="field">

                    <label class="label">Género</label>

                    <div class="control">

                        <div class="select is-fullwidth">

                            <select id="genero">

                                <option>Seleccione su género</option>

                                <option>Masculino</option>

                                <option>Femenino</option>

                                <option>Therian</option>

                            </select>

                        </div>

                    </div>

                </div>

                <div class="field">

                    <label class="label">Cargo</label>

                    <div class="control">

                        <input class="input" type="text" placeholder="Ej:Administrador" id="cargo">

                    </div>

                </div>

            </div>

        </div>

        <div class="botones">

            <button id="btnGuardar" class="button boton-guardar">

                Guardar Usuario

            </button>

            <button id="btnInicio">

                Volver al inicio

            </button>

        </div>

    </div>

</div>

<script src="../js/usuarios.js"></script>

</body>
</html>
