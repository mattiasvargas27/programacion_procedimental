<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css"
  />
    <title>Usuarios</title>
</head>
<body>
    <nav class="navbar" role="navigation">
    <div class="navbar-brand">
      <a class="navbar-item">Ingresa tus datos</a>
      

   <div class="columns">
   <div class="column">
        <div class="field">
  <label class="label">Ingresa tu nombre</label>
  <div class="control">
    <input class="input" type="text" placeholder="Ej:Mattias">
  </div>

</div>
    
   
<div class="field">
  <label class="label">Ingresa tu apellido</label>
  <div class="control">
    <input class="input" type="text" placeholder="Ej:Vargas Lopez">
  </div>
</div>
    

<div class="field">
  <label class="label">Tipo de documento</label>

  <label class="radio">
    <input type="radio" name="promociones" value="si">
  TI
  </label>

  <label class="radio">
    <input type="radio" name="promociones" value="no">
    CC
  </label>
  <div class="field">
  <label class="label">Numero de documento</label>
  <div class="control">
    <input class="input" type="number" placeholder="Ej:123456789">
  </div>
  

</div>
</div>

<div class="field">
  <label class="label">Telefono</label>
  <div class="control">
    <input class="input" type="number" placeholder="Ej:32134503">
  </div>
</div>
</div>
<div class="column">
<div class="field">
  <label class="label">Email</label>
  <div class="control">
    <input class="input" type="email" placeholder="Ej:correo@gmail.com">
  </div>
</div>

<div class="field">
  <label class="label">Género</label>

  <div class="control">
    <div class="select">
        <select name="genero" required>
        <option value="">Seleccione su género</option>
        <option value="masculino">Masculino</option>
        <option value="femenino">Femenino</option>
        <option value="therian">Therian</option>
      </select>
    </div>
  </div>
</div>

<div class="field">
  <label class="label">Cargo</label>
  <div class="control">
    <input class="input" type="text" placeholder="Ej:Estudiante">
  </div>
</div>

</div>
</div>
</body>
</html>
